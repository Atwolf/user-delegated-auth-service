name: magnum-opus-minified-agui-agent

services:
  python-base:
    image: python-base
    build:
      context: ../..
      dockerfile: infra/docker/python-base.Dockerfile
    profiles:
      - build

  ag-ui-gateway:
    build:
      context: .
      dockerfile: services/ag_ui_gateway/Dockerfile
    environment:
      AGENT_SERVICE_URL: http://agent-service:8090
    ports:
      - "${AG_UI_GATEWAY_HOST_PORT:-18088}:8088"
    depends_on:
      agent-service:
        condition: service_started

  agent-service:
    build:
      context: .
      dockerfile: services/agent_service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      AGENT_SERVICE_RUNTIME_MODE: ${AGENT_SERVICE_RUNTIME_MODE:-auto}
      AGENT_SERVICE_STORE_TTL_SECONDS: ${AGENT_SERVICE_STORE_TTL_SECONDS:-86400}
      GOOGLE_ADK_MODEL: ${GOOGLE_ADK_MODEL:-gemini-flash-latest}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-false}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-}
    ports:
      - "${AGENT_SERVICE_HOST_PORT:-18090}:8090"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 20
