name: magnum-opus-minified-agui-agent

x-backend-build: &backend-build
  context: .
  dockerfile: backend.Dockerfile

services:
  python-base:
    image: python-base
    build:
      context: ../..
      dockerfile: infra/docker/python-base.Dockerfile
    profiles:
      - build

  ag-ui-gateway:
    image: ${AG_UI_GATEWAY_IMAGE:-magnum-opus-minified-agui-agent-ag-ui-gateway:local}
    build:
      <<: *backend-build
      args:
        SERVICE_PATH: ag_ui_gateway
        SERVICE_MODULE: ag_ui_gateway_simple.app
        SERVICE_PORT: "8088"
    environment:
      AGENT_SERVICE_URL: http://agent-service:8090
    ports:
      - "${AG_UI_GATEWAY_HOST_PORT:-18088}:8088"
    depends_on:
      agent-service:
        condition: service_started

  agent-service:
    image: ${AGENT_SERVICE_IMAGE:-magnum-opus-minified-agui-agent-agent-service:local}
    build:
      <<: *backend-build
      args:
        SERVICE_PATH: agent_service
        SERVICE_MODULE: agent_service_simple.app
        SERVICE_PORT: "8090"
    environment:
      REDIS_URL: redis://redis:6379/0
      AGENT_SERVICE_RUNTIME_MODE: ${AGENT_SERVICE_RUNTIME_MODE:-auto}
      AGENT_SERVICE_STORE_TTL_SECONDS: ${AGENT_SERVICE_STORE_TTL_SECONDS:-86400}
      GOOGLE_ADK_MODEL: ${GOOGLE_ADK_MODEL:-gemini-flash-latest}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-false}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-}
    ports:
      - "${AGENT_SERVICE_HOST_PORT:-18090}:8090"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 20
